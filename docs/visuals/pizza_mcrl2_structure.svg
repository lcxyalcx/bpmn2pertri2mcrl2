  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />

  <rect x="40" y="30" width="140" height="60" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="2" />
  <text x="110" y="65" text-anchor="middle" font-family="Arial" font-size="12" fill="#0369a1">Marking m</text>

  <rect x="240" y="20" width="140" height="50" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2" />
  <text x="310" y="50" text-anchor="middle" font-family="Arial" font-size="11" fill="#92400e">p_0: Order</text>

  <rect x="240" y="95" width="140" height="50" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2" />
  <text x="310" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#92400e">p_1: Prepare</text>

  <rect x="240" y="170" width="140" height="50" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2" />
  <text x="310" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#92400e">p_2: Deliver</text>

  <line x1="180" y1="60" x2="240" y2="45" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="180" y1="60" x2="240" y2="120" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="180" y1="60" x2="240" y2="195" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="430" y="35" width="130" height="50" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" />
  <text x="495" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#1d4ed8">fire_t_0</text>
  <text x="495" y="80" text-anchor="middle" font-family="Arial" font-size="9" fill="#1d4ed8">guard m(p_0)>0</text>

  <rect x="600" y="35" width="180" height="50" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2" />
  <text x="690" y="65" text-anchor="middle" font-family="Arial" font-size="10" fill="#15803d">update: p_0-1, p_1+1</text>

  <line x1="380" y1="45" x2="430" y2="60" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="560" y1="60" x2="600" y2="60" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="430" y="130" width="130" height="50" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" />
  <text x="495" y="160" text-anchor="middle" font-family="Arial" font-size="11" fill="#1d4ed8">fire_t_1</text>
  <text x="495" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#1d4ed8">guard m(p_1)>0</text>

  <rect x="600" y="130" width="180" height="50" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2" />
  <text x="690" y="160" text-anchor="middle" font-family="Arial" font-size="10" fill="#15803d">update: p_1-1, p_2+1</text>

  <line x1="380" y1="120" x2="430" y2="155" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="560" y1="155" x2="600" y2="155" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />

  <text x="410" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#374151">mCRL2 结构示意</text>
