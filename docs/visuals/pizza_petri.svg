<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="220" viewBox="0 0 760 220">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />

  <circle cx="90" cy="110" r="34" fill="#fef3c7" stroke="#92400e" stroke-width="2" />
  <text x="90" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#92400e">Order</text>
  <text x="90" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#92400e">tokens=1</text>

  <rect x="190" y="80" width="110" height="60" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" />
  <text x="245" y="115" text-anchor="middle" font-family="Arial" font-size="12" fill="#1d4ed8">MakePizza</text>

  <circle cx="360" cy="110" r="34" fill="#fef3c7" stroke="#92400e" stroke-width="2" />
  <text x="360" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#92400e">Prepare</text>
  <text x="360" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#92400e">tokens=0</text>

  <rect x="460" y="80" width="100" height="60" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" />
  <text x="510" y="115" text-anchor="middle" font-family="Arial" font-size="12" fill="#1d4ed8">ShipPizza</text>

  <circle cx="650" cy="110" r="34" fill="#fef3c7" stroke="#92400e" stroke-width="2" />
  <text x="650" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#92400e">Deliver</text>
  <text x="650" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#92400e">tokens=0</text>

  <line x1="124" y1="110" x2="190" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="300" y1="110" x2="326" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="394" y1="110" x2="460" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="560" y1="110" x2="616" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <text x="380" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#374151">Pizza Petri Net</text>
</svg>
